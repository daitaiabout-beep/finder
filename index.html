<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>FINDER - Standard</title>
    <style>
        :root { 
            --ui-color: rgba(255, 255, 255, 0.9);
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }

        /* ── 背景スライドコンテナ ── */
        #stage {
            display: flex;
            height: 100%; width: 100%;
            will-change: transform;
        }

        /* スロット（左・中・右 の3枚固定） */
        .video-slot {
            position: relative;
            width: 100vw; height: 100%; flex-shrink: 0;
            overflow: hidden;
            background: #000;
        }

        /* video を cover 表示 */
        .video-slot video {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            object-fit: cover;
        }

        /* ── UIレイヤー（ファインダー枠） ── */
        #ui-overlay {
            position: absolute; inset: 0;
            border: 15px solid #000;
            pointer-events: none; z-index: 100;
        }
        /* corner は下部で再定義 */
        .top-left    { top: 40px;    left: 40px;  border-right: none; border-bottom: none; }
        .top-right   { top: 40px;    right: 40px; border-left: none;  border-bottom: none; }
        .bottom-left { bottom: 40px; left: 40px;  border-right: none; border-top: none; }
        .bottom-right{ bottom: 40px; right: 40px; border-left: none;  border-top: none; }

        /* ── ナビゲーションボタン ── */
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--ui-color);
            font-size: 40px; cursor: pointer; z-index: 200;
            padding: 20px; transition: opacity 0.2s;
        }
        .nav-btn:hover { opacity: 0.6; }
        .prev { left: 20px; }
        .next { right: 20px; }

        /* ── 撮影ボタン ── */
        #shutter-btn {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 80px; height: 80px; border-radius: 50%;
            border: 4px solid var(--ui-color);
            background: transparent; cursor: pointer; z-index: 200;
            display: flex; align-items: center; justify-content: center;
        }
        #shutter-btn::after {
            content: ''; width: 60px; height: 60px; border-radius: 50%;
            background: var(--ui-color); opacity: 0.3; transition: 0.15s;
        }
        #shutter-btn:active::after { transform: scale(0.9); opacity: 0.8; }

        /* ── 演出・ポップアップ ── */
        #flash {
            position: absolute; inset: 0; background: #fff;
            opacity: 0; pointer-events: none; z-index: 500;
            transition: opacity 0.08s;
        }
        #popup {
            position: absolute; inset: 0; background: rgba(0,0,0,0.98);
            display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
        }
        #card { width: 90%; max-width: 800px; background: #000; }

        /* ── キャプション ── */
        #caption {
            position: absolute;
            bottom: 120px; left: 0; right: 0;
            text-align: center;
            pointer-events: none; z-index: 150;
            transition: opacity 0.35s ease;
        }
        #caption-inner {
            display: inline-block;
            width: 100%;
            padding: 18px 40px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        #caption-name {
            font-size: 0.85rem;
            letter-spacing: 0.22em;
            color: rgba(255,255,255,0.6);
            margin-bottom: 8px;
        }
        #caption-text {
            font-size: 1.3rem;
            letter-spacing: 0.08em;
            color: rgba(255,255,255,0.95);
            text-shadow: 0 1px 12px rgba(0,0,0,0.5);
        }
        #caption.hidden { opacity: 0; }

        /* ── ファインダー枠 強調 ── */
        .corner {
            position: absolute; width: 40px; height: 40px;
            border: 2px solid rgba(255,255,255,0.9);
            filter: drop-shadow(0 0 4px rgba(255,255,255,0.6));
        }

        /* ── タイトル画面 ── */
        #title-screen {
            position: absolute; inset: 0;
            background: #000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 24px;
            z-index: 900;
            transition: opacity 0.8s ease;
        }
        #title-screen.fade-out { opacity: 0; pointer-events: none; }
        #title-screen.hidden { display: none; }
        #title-logo {
            font-size: 2.2rem;
            letter-spacing: 0.3em;
            color: rgba(255,255,255,0.92);
            font-weight: normal;
        }
        #title-sub {
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            color: rgba(255,255,255,0.4);
            text-align: center;
            line-height: 2;
        }
        #title-start {
            margin-top: 16px;
            background: none;
            border: 1px solid rgba(255,255,255,0.4);
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
            letter-spacing: 0.25em;
            padding: 12px 40px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #title-start:hover {
            border-color: rgba(255,255,255,0.9);
            color: #fff;
        }
        #title-pc-note {
            font-size: 0.68rem;
            letter-spacing: 0.12em;
            color: rgba(255,255,255,0.25);
            text-align: center;
        }

        /* ── 人物認識ボックス ── */
        .detect-box {
            position: absolute;
            border: 2px solid rgba(255,255,255,0.75);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.15), inset 0 0 0 1px rgba(255,255,255,0.08);
            pointer-events: none;
            z-index: 140;
            opacity: 0;
            transition: opacity 0.6s ease;
            
        }
        .detect-box.visible { opacity: 1; }

        /* 四隅の角だけ強調 */
        .detect-box::before, .detect-box::after {
            content: '';
            position: absolute;
            width: 12px; height: 12px;
            border-color: rgba(255,255,255,0.95);
            border-style: solid;
        }
        .detect-box::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        .detect-box::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

        /* 残り2角はspanで */
        .detect-box .corner-tr {
            position: absolute; top: -1px; right: -1px;
            width: 12px; height: 12px;
            border-top: 2px solid rgba(255,255,255,0.95);
            border-right: 2px solid rgba(255,255,255,0.95);
        }
        .detect-box .corner-bl {
            position: absolute; bottom: -1px; left: -1px;
            width: 12px; height: 12px;
            border-bottom: 2px solid rgba(255,255,255,0.95);
            border-left: 2px solid rgba(255,255,255,0.95);
        }

        /* セリフラベル */
        .detect-label {
            position: absolute;
            top: -4.2em;
            left: 0;
            white-space: nowrap;
            font-size: 1.0rem;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
            line-height: 1.8;
        }

        /* スキャンライン（横に流れる線） */
        .detect-box .scan-line {
            position: absolute;
            left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            animation: scan 2.4s ease-in-out infinite;
        }
        @keyframes scan {
            0%   { top: 0%;   opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* ── キーボードヒント ── */
        #kb-hint {
            position: absolute;
            bottom: 20px; right: 20px;
            font-size: 0.62rem;
            letter-spacing: 0.12em;
            color: rgba(255,255,255,0.2);
            pointer-events: none;
            z-index: 150;
            line-height: 1.8;
            text-align: right;
        }
    </style>
</head>
<body>

<div id="flash"></div>

<!-- タイトル画面 -->
<div id="title-screen">
    <div id="title-logo">嘘シャニマス聖地</div>
    <div id="title-sub">
        ファインダーを覗いて、彼女たちを探そう。<br>
        見つけたら、シャッターを切る。
    </div>
    <button id="title-start" onclick="startGame()">FINDER を起動する</button>
    <div id="title-pc-note">
        PC推奨 / 横向き推奨<br>
        Space: 撮影 &nbsp; ← →: 移動
    </div>
</div>

<div id="stage"></div>
<div id="detect-layer" style="position:absolute;inset:0;pointer-events:none;z-index:140;"></div>

<div id="ui-overlay">
    <div class="corner top-left"></div>
    <div class="corner top-right"></div>
    <div class="corner bottom-left"></div>
    <div class="corner bottom-right"></div>
</div>

<button class="nav-btn prev" onclick="app.move(-1)">＜</button>
<button class="nav-btn next" onclick="app.move(1)">＞</button>

<div id="shutter-btn" onclick="app.capture()"></div>

<div id="caption">
    <div id="caption-inner">
        <div id="caption-name"></div>
        <div id="caption-text"></div>
    </div>
</div>

<div id="kb-hint">
    Space : 撮影<br>
    ← → : 移動
</div>

<div id="popup" onclick="app.close()">
    <div id="card" onclick="event.stopPropagation()">
        <div id="video-container" style="width:100%; aspect-ratio:16/9;"></div>
        <div style="padding:30px; color:#fff; text-align:center;">
            <div id="p-name" style="font-size:1.4rem; letter-spacing:0.1em;"></div>
            <div id="p-desc" style="font-size:0.9rem; color:#888; margin-top:10px;"></div>
        </div>
    </div>
</div>

<script>
const spots = [
    // ★ video: mp4ファイル名
    // ★ detect: 認識ボックスの位置とセリフ
    //    left/top: 画面左上からの位置(%)  width/height: サイズ(%)
    { name: "SIGHT 01", video: "scene02.mov", vId: "kTgRkGkTw74", desc: "ここに説明文を入れてください。",
      caption: { speaker: "霧子", line: "こんにちは…また、会えたね" },
      detect: { left: 28, top: 48, width: 20, height: 78, speaker: "霧子", line: "こんにちは…また、会えたね" , color: "#d9f2ff"} },
    { name: "SIGHT 02", video: "scene03.mov", vId: "U3c24lYxDxs", desc: "その写真に込めた想いや、場所の記憶を記述します。",
      caption: { speaker: "夏葉", line: "あら、いい眺めじゃない!" },
      detect: { left: 55, top: 40, width: 18, height: 60, speaker: "夏葉", line: "あら、いい眺めじゃない!" , color: "#90e667"} },
    { name: "SIGHT 03", video: "scene04.mov", vId: "lBkcJVf56WQ", desc: "「撮る」という体験が、ここで完結します。",
      caption: { speaker: "めぐる", line: "深呼吸、深呼吸!" },
      detect: { left: 42, top: 50, width: 12, height: 55, speaker: "めぐる", line: "深呼吸、深呼吸!" , color: "#ffe012"} },
];

// ── スリングショット遷移パラメータ ──
const PULLBACK   = 2.5;   // 逆方向への引き量（vw）
const PULLBACK_T = 90;    // 引きのduration (ms)
const PAN_T      = 160;   // 高速パンのduration (ms)
const SETTLE_T   = 120;   // 着地・微バウンスのduration (ms)
const BOUNCE     = 0.8;   // 着地後のオーバーシュート量（vw）

class StandardApp {
    constructor() {
        this.index = 0;
        this.isMoving = false;
        this.visitedIndices = new Set([0]); // 既出スライドを記録
        this.init();
    }

    init() {
        const stage = document.getElementById('stage');
        // スロットは左・中・右 の3枚固定（中が現在表示）
        for (let i = 0; i < 3; i++) {
            const slot = document.createElement('div');
            slot.className = 'video-slot';
            const vid = document.createElement('video');
            vid.autoplay = true;
            vid.loop = true;
            vid.muted = true;
            vid.playsInline = true;
            vid.src = spots[0].video; // 初期は全スロットに最初の動画を仮セット
            slot.appendChild(vid);
            stage.appendChild(slot);
        }
        // 中スロット（インデックス1）だけ正式に再生
        this._playSlot(1, 0);

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight' || e.key === 'd') this.move(1);
            if (e.key === 'ArrowLeft'  || e.key === 'a') this.move(-1);
            if (e.key === ' ') { e.preventDefault(); this.capture(); }
        });
    }

    // ── 現在以外からランダムに1枚選ぶ（未訪問優先） ──
    pickRandom() {
        const unvisited = spots
            .map((_, i) => i)
            .filter(i => i !== this.index && !this.visitedIndices.has(i));
        if (unvisited.length > 0) {
            return unvisited[Math.floor(Math.random() * unvisited.length)];
        }
        // 全部見たらリセット
        this.visitedIndices.clear();
        this.visitedIndices.add(this.index);
        const others = spots.map((_, i) => i).filter(i => i !== this.index);
        return others[Math.floor(Math.random() * others.length)];
    }

    // ── スリングショット遷移 ──
    async move(dir) {
        if (this.isMoving) return;
        this.isMoving = true;

        const stage = document.getElementById('stage');
        const slides = stage.querySelectorAll('.photo-section');

        // 「進む先のスロット」= 現在スロットの隣（dir方向）
        // スロットは 0,1,2 の3枚で固定。現在は常にスロット1に居座る設計にする。
        // → 毎回「スロット1が現在、スロット(1+dir)が次」として差し替える。

        const CUR  = 1;           // 現在は常にスロット1
        const NEXT = 1 + dir;     // 0 or 2

        // 次スロットに今回表示する画像をセット
        const nextSpotIdx = this.pickRandom();
        this._loadSlot(NEXT, nextSpotIdx);

        // 現在スロット(1)に合わせてステージをリセット（transition無し）
        this._setTransition(stage, 'none');
        stage.style.transform = `translateX(${-CUR * 100}vw)`;

        // 1フレーム待ってtransitionリセットを確定させる
        await this._wait(16);

        const currentX = -CUR * 100;
        const targetX  = -NEXT * 100;

        // ─ フェーズ1: 逆方向に引く ─
        this._setTransition(stage, `transform ${PULLBACK_T}ms cubic-bezier(0.25, 0, 0.5, 1)`);
        stage.style.transform = `translateX(${currentX + dir * -PULLBACK}vw)`;
        this._setCaption(false);
        this._hideDetect();
        await this._wait(PULLBACK_T);

        // ─ フェーズ2: 高速パン ─
        this._setTransition(stage, `transform ${PAN_T}ms cubic-bezier(0.4, 0, 1, 1)`);
        stage.style.transform = `translateX(${targetX - dir * BOUNCE}vw)`;
        await this._wait(PAN_T);

        // ─ フェーズ3: 着地バウンス ─
        this._setTransition(stage, `transform ${SETTLE_T}ms cubic-bezier(0.2, 0.8, 0.4, 1)`);
        stage.style.transform = `translateX(${targetX}vw)`;
        await this._wait(SETTLE_T);

        // ── 着地後: 現在スロットを次の画像に差し替えてスロット1に戻す ──
        this._setTransition(stage, 'none');
        this._playSlot(CUR, nextSpotIdx);
        stage.style.transform = `translateX(${-CUR * 100}vw)`;

        this.index = nextSpotIdx;
        this.visitedIndices.add(nextSpotIdx);
        this._updateCaption(nextSpotIdx);
        this._setCaption(true);
        this._showDetect(nextSpotIdx);
        this.isMoving = false;
    }

    capture() {
        if (this.isMoving || document.getElementById('popup').style.display === 'flex') return;
        const flash = document.getElementById('flash');
        flash.style.opacity = 1;
        setTimeout(() => {
            flash.style.opacity = 0;
            this.open();
        }, 100);
    }

    open() {
        const s = spots[this.index];
        document.getElementById('p-name').innerText   = s.name;
        document.getElementById('p-desc').innerText   = s.desc;
        document.getElementById('video-container').innerHTML =
            `<iframe width="100%" height="100%"
                src="https://www.youtube.com/embed/${s.vId}?autoplay=1"
                frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        document.getElementById('popup').style.display = 'flex';
    }

    close() {
        document.getElementById('popup').style.display = 'none';
        document.getElementById('video-container').innerHTML = '';
    }

    // ── ユーティリティ ──
    _setTransition(el, val) { el.style.transition = val; }
    _wait(ms) { return new Promise(r => setTimeout(r, ms)); }

    // スロットに動画をセットして再生（着地後に呼ぶ）
    _playSlot(slotIdx, spotIdx) {
        const slots = document.querySelectorAll('.video-slot');
        const vid = slots[slotIdx].querySelector('video');
        vid.src = spots[spotIdx].video;
        vid.load();
        vid.play().catch(() => {});
    }

    // スロットに動画をセットするだけ（パン前のプリロード）
    _loadSlot(slotIdx, spotIdx) {
        const slots = document.querySelectorAll('.video-slot');
        const vid = slots[slotIdx].querySelector('video');
        vid.src = spots[spotIdx].video;
        vid.load();
        // パン中は再生しておく（着地時にすでに動いている状態にする）
        vid.play().catch(() => {});
    }

    _updateCaption(spotIdx) {
        const c = spots[spotIdx].caption;
        document.getElementById('caption-name').textContent = c ? c.speaker : '';
        document.getElementById('caption-text').textContent = c ? c.line    : '';
    }

    _showDetect(spotIdx) {
        const layer = document.getElementById('detect-layer');
        layer.innerHTML = '';
        const d = spots[spotIdx].detect;
        if (!d) return;

        const box = document.createElement('div');
        box.className = 'detect-box';
        box.style.left   = d.left   + '%';
        box.style.top    = d.top    + '%';
        box.style.width  = d.width  + '%';
        box.style.height = d.height + '%';
        
        const c = d.color || 'rgba(255,255,255,0.75)';
        box.style.borderColor = c;
        box.style.boxShadow = `0 0 0 1px ${c}30, inset 0 0 0 1px ${c}15`;


        // 四隅
        box.innerHTML = `
            <span class="corner-tr"></span>
            <span class="corner-bl"></span>
            <div class="scan-line"></div>
            <div class="detect-label">${d.speaker}<br>${d.line}</div>
        `;
        layer.appendChild(box);

        // フェードイン
        requestAnimationFrame(() => {
            requestAnimationFrame(() => { box.classList.add('visible'); });
        });
    }

    _hideDetect() {
        const layer = document.getElementById('detect-layer');
        const box = layer.querySelector('.detect-box');
        if (box) box.classList.remove('visible');
    }
    _setCaption(visible) {
        document.getElementById('caption').classList.toggle('hidden', !visible);
    }
}

const app = new StandardApp();
app._updateCaption(0);
app._setCaption(true);
app._showDetect(0);

function startGame() {
    const title = document.getElementById('title-screen');
    title.classList.add('fade-out');
    setTimeout(() => title.classList.add('hidden'), 800);
}
</script>
</body>
</html>
